operator:
  name: "itransformer_forecaster"
  config:
    seq_len: 160
    pred_len: 30
    d_model: 256
    nhead: 4
    num_layers: 2
    dim_feedforward: 512
    dropout: 0.2
    lag_aware: true
    lag_max: 16
    lag_bias_scale: 2.0
    lag_dropout: 0.2
    kan_grid_size: 5
    target_idx: -1
    epochs: 30
    batch_size: 128
    lr: 0.001
    weight_decay: 0.00001
    early_stop_patience: 12
    train_ratio: 0.7
    val_ratio: 0.15
    trend_weight: 1.0
    time_weight_start: 0.1
    time_weight_end: 1.0
    max_grad_norm: 1.0
    scheduler_factor: 0.5
    scheduler_patience: 3
    device: cuda

preprocessing:
  time_col: "datatime"
  max_gap: 5.0
  target_col: "diya_qibao_shuiwei_youxuanzhi"
  chunk_size: 100000
  ema_alpha: 0.3

paths:
  preprocessed_dir: "preprocessed_tsa"
  model_save_dir: "saved_models/tsa_itransformer"
